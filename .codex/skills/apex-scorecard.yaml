name: apex-scorecard

description: >
  Generate a Launch Readiness Scorecard for a specific APEX asset.
  Calls the scorecard generator and saves the result to
  agents/outputs/launch_readiness_scorecard_<APEX_ID>_<DATE>.json.
  Prints the LRS score and status to the terminal on completion.

inputs:
  - name: apex_id
    description: "APEX asset ID to score, e.g. APEX-004"
    required: true

command: |
  python run_apex.py --asset {{ apex_id }} --scorecard --verbose

success_message: "Scorecard for {{ apex_id }} generated. Check agents/outputs/ for the JSON file."
error_message: "Scorecard failed. Check that {{ apex_id }} exists in asset-registry/apex_assets.json."
